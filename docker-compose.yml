services:
  iot-core:
    build: .
    container_name: iot-core-server
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    # Доступ к Serial устройствам (Arduino, USB датчики)
    # ВАЖНО: Раскомментируйте нужные устройства или используйте bridge.py на хосте
    # devices:
    #   - /dev/ttyUSB0:/dev/ttyUSB0  # Linux USB Serial
    #   - /dev/ttyACM0:/dev/ttyACM0  # Linux USB Serial (альтернативный)
    # Для настройки см. arduino/DOCKER.md
    # Альтернатива: privileged режим (НЕ для продакшена!)
    # privileged: true
    env_file:
      - .env
    environment:
      - DATABASE_PATH=/app/data/iot_core.db
      # MQTT credentials
      - MQTT_USERNAME=iot-core
      - MQTT_PASSWORD=${MQTT_IOT_CORE_PASSWORD:-change-this-mqtt-password}
    depends_on:
      mqtt-broker:
        condition: service_healthy
    networks:
      - iot-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  webhook-receiver:
    build: ./webhook_receiver
    container_name: iot-webhook-receiver
    restart: unless-stopped
    ports:
      - "8001:8001"
    depends_on:
      - iot-core
    networks:
      - iot-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  mqtt-broker:
    image: eclipse-mosquitto:2.0
    container_name: iot-mqtt-broker
    restart: unless-stopped
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log
      - ./mosquitto/init_users.sh:/mosquitto/init_users.sh
    environment:
      - MQTT_IOT_CORE_PASSWORD=${MQTT_IOT_CORE_PASSWORD:-change-this-mqtt-password}
      - MQTT_ADMIN_PASSWORD=${MQTT_ADMIN_PASSWORD:-change-this-admin-password}
    entrypoint: /bin/sh -c "sh /mosquitto/init_users.sh && exec /docker-entrypoint.sh mosquitto -c /mosquitto/config/mosquitto.conf"
    networks:
      - iot-network
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_pub -h localhost -u iot-core -P \"$${MQTT_IOT_CORE_PASSWORD:-change-this-mqtt-password}\" -t healthcheck -m ping -q 0 >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  iot-network:
    driver: bridge

volumes:
  data:
  logs:
  mosquitto-data:
  mosquitto-log:
